<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Congratulations Class of 2025</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap "
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap "
      rel="stylesheet"
    />

    <style>
      /* Reset & Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: white;
        overflow: hidden; /* Prevent scrolling */
        min-height: 100vh;
      }

      header {
        text-align: center;
        padding: 1.5rem 0;
        background: rgba(128, 150, 8, 0.7);
        position: fixed;
        width: 100%;
        z-index: 100;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(8px);
      }

      #animated-title {
        font-family: "Poetsen One", sans-serif;
        font-size: 4rem;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.1em;
        margin: 0;
        color: #0f1864;
        text-shadow: 0 0 15px #0f1864, 0 0 30px #0f1864;
        user-select: none;
        align-items: center;
      }

      .letter {
        display: inline-block;
        vertical-align: middle;
        line-height: 1;
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(0.5) rotate(var(--r));
        animation: flyIn 1s ease-out forwards;
        color: #fcf81d;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      }

      .emoji {
        font-size: 4rem;
        margin: 0 0.15em;
        user-select: none;
        filter: drop-shadow(0 0 8px rgba(255, 242, 0, 0.6));
      }

      #shoutout-banner {
        position: absolute;
        top: 80px;
        width: 100%;
        text-align: center;
        pointer-events: none;
        z-index: 50;
      }

      #shoutout-banner h2 {
        font-family: "Poetsen One", cursive;
        font-size: 2.5rem;
        color: #ffffff;
        max-width: 80%;
        padding: 0.5rem 1rem;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 30px;
        display: inline-block;
        animation: fadeName 3s infinite;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      }

      @keyframes fadeName {
        0%,
        100% {
          opacity: 1;
          transform: translateY(0);
        }
        50% {
          opacity: 0.7;
          transform: translateY(-10px);
        }
      }

      @keyframes flyIn {
        0% {
          opacity: 0;
          transform: translate(var(--x), var(--y)) scale(0.5) rotate(var(--r));
        }
        60% {
          opacity: 1;
          transform: translate(0, 0) scale(1.1) rotate(0deg);
        }
        100% {
          opacity: 1;
          transform: translate(0, 0) scale(1) rotate(0deg);
        }
      }

      #slideshow {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 100px;
        overflow: hidden;
      }

      .slide-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .slide {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 1s cubic-bezier(0.33, 0, 0.2, 1);
        z-index: 1;
        opacity: 0;
      }

      .slide img {
        max-width: 95vw;
        max-height: 85vh; /* Reduced from 100vh */
        object-fit: cover;
        border-radius: 8px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(255, 255, 255, 0.1);
        transition: all 0.5s ease;
      }

      .slide.active {
        transform: translateX(0) scale(1);
        opacity: 1;
        z-index: 3;
      }

      .slide.prev-slide {
        transform: translateX(-40%) scale(0.85);
        opacity: 0.2;
        z-index: 2;
        filter: brightness(0.7);
      }

      .slide.next-slide {
        transform: translateX(40%) scale(0.85);
        opacity: 0.2;
        z-index: 2;
        filter: brightness(0.7);
      }

      .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 242, 0, 0.2);
        color: white;
        border: none;
        font-size: 3rem;
        padding: 1rem;
        cursor: pointer;
        z-index: 10;
        border-radius: 50%;
        width: 70px;
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .nav-btn:hover {
        background: rgba(255, 242, 0, 0.4);
        transform: translateY(-50%) scale(1.1);
      }

      .prev {
        left: 2rem;
      }

      .next {
        right: 2rem;
      }

      .progress-container {
        position: absolute;
        bottom: 30px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        z-index: 10;
      }

      .progress-bar {
        height: 4px;
        width: 200px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: #fff200;
        transition: width linear;
      }

      .dots-nav {
        position: absolute;
        bottom: 80px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 10px;
        z-index: 10;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .dot.active {
        background: #fff200;
        transform: scale(1.3);
      }

      .dot:hover {
        transform: scale(1.3);
      }

      @media (max-width: 768px) {
        #shoutout-banner h2 {
          font-size: 1.8rem;
          padding: 0.3rem 0.8rem;
        }

        .nav-btn {
          width: 50px;
          height: 50px;
          font-size: 2rem;
        }

        .slide img {
          max-height: 70vh;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1 id="animated-title" aria-label="Congratulations Class of 2025">
        <span class="emoji" aria-hidden="true">🎓</span>
        <!-- Animated letters inserted here -->
        <span class="emoji" aria-hidden="true">🎉</span>
      </h1>
    </header>

    <main>
      <div id="slideshow" class="active-view">
        <!-- Shoutout Banner -->
        <div id="shoutout-banner">
          <h2 id="name-shoutout">🎉 Shoutout to Alice Johnson!</h2>
        </div>

        <!-- Slides -->
        <div class="slide-container">
          {% for image in images %}
          <div class="slide {% if loop.first %}active{% endif %}">
            <img
              src="{{ image }}"
              loading="eager"
              alt="Memory {{ loop.index }}"
            />
          </div>
          {% endfor %}
        </div>

        <!-- Navigation -->
        <button class="nav-btn prev" onclick="changeSlide(-1)">❮</button>
        <button class="nav-btn next" onclick="changeSlide(1)">❯</button>

        <!-- Dots & Progress -->
        <div class="dots-nav"></div>
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti @1.6.0/dist/confetti.browser.min.js"></script>

    <script>
      // Animate Title Letters
      const rawText = " Congratulations Class of 2025 ";
      const titleContainer = document.getElementById("animated-title");
      const directions = [
        { x: "-100vw", y: "0" },
        { x: "100vw", y: "0" },
        { x: "0", y: "-100vh" },
        { x: "0", y: "100vh" },
        { x: "-100vw", y: "-100vh" },
        { x: "100vw", y: "-100vh" },
        { x: "-100vw", y: "100vh" },
        { x: "100vw", y: "100vh" },
      ];

      function createLetters() {
        document.querySelectorAll('.letter').forEach(letter => letter.remove());
        rawText.split("").forEach((char, index) => {
          const span = document.createElement("span");
          span.textContent = char;
          const dir = directions[Math.floor(Math.random() * directions.length)];
          const rotation = `${Math.floor(Math.random() * 60 - 30)}deg`;
          span.style.setProperty("--x", dir.x);
          span.style.setProperty("--y", dir.y);
          span.style.setProperty("--r", rotation);
          span.style.animationDelay = `${index * 0.05}s`;
          span.classList.add("letter");
          titleContainer.insertBefore(span, titleContainer.querySelector(".emoji:last-child"));
        });
      }

      createLetters();
      setInterval(() => createLetters(), 20000);

      // Slideshow Logic
      const images = {{ images|tojson }};
      let slideIndex = 0;
      let slideInterval;
      const slideDuration = 5000;
      const confettiTriggeredIndexes = new Set();

      function createDots() {
        const dotsContainer = document.querySelector('.dots-nav');
        dotsContainer.innerHTML = '';
        const slides = document.querySelectorAll('.slide');
        slides.forEach((slide, index) => {
          const dot = document.createElement('div');
          dot.classList.add('dot');
          if (index === slideIndex) dot.classList.add('active');
          dot.addEventListener('click', () => goToSlide(index));
          dotsContainer.appendChild(dot);
        });
      }

      function updateDots() {
        document.querySelectorAll('.dot').forEach((dot, index) => {
          dot.classList.toggle('active', index === slideIndex);
        });
      }

      function goToSlide(index) {
        stopSlideshow();
        slideIndex = index;
        updateSlideClasses();
        updateDots();
        startSlideshow();
      }

      function updateSlideClasses() {
        const slides = document.querySelectorAll(".slide");
        const totalSlides = slides.length;
        slides.forEach((slide, index) => {
          slide.className = 'slide';
          let diff = (index - slideIndex + totalSlides) % totalSlides;
          if (diff > totalSlides / 2) diff -= totalSlides;

          if (index === slideIndex) slide.classList.add("active");
          else if (diff === -1 || diff === totalSlides - 1) slide.classList.add("prev-slide");
          else if (diff === 1 || diff === -totalSlides + 1) slide.classList.add("next-slide");
          else slide.classList.add("hidden");
        });
      }

      function showSlide(n) {
        const slides = document.querySelectorAll(".slide");
        const totalSlides = slides.length;
        slideIndex = (n + totalSlides) % totalSlides;
        updateSlideClasses();
        updateDots();

        const progressFill = document.querySelector('.progress-fill');
        progressFill.style.width = '0%';
        setTimeout(() => {
          progressFill.style.transition = `width ${slideDuration/1000}s linear`;
          progressFill.style.width = '100%';
        }, 10);

        if (slideIndex % 3 === 0 && !confettiTriggeredIndexes.has(slideIndex)) {
          confettiTriggeredIndexes.add(slideIndex);
          fireRandomConfetti();
        }
      }

      function changeSlide(n) {
        stopSlideshow();
        showSlide(slideIndex + n);
        startSlideshow();
      }

      function startSlideshow() {
        stopSlideshow();
        slideInterval = setInterval(() => changeSlide(1), slideDuration);
      }

      function stopSlideshow() {
        clearInterval(slideInterval);
      }

      function fireRandomConfetti() {
        const count = 200;
        const defaults = { origin: { y: Math.random() * 0.6 } };
        const shapes = ["square", "circle", "star"];
        const angles = [60, 120, 90, 45];
        for (let i = 0; i < 4; i++) {
          confetti(Object.assign({}, defaults, {
            particleCount: Math.floor(count / 4),
            spread: Math.random() * 80 + 70,
            angle: angles[Math.floor(Math.random() * angles.length)],
            origin: { x: Math.random(), y: Math.random() * 0.5 },
            shapes: [shapes[Math.floor(Math.random() * shapes.length)]],
            scalar: Math.random() * 0.7 + 0.8,
            colors: ['#fff200', '#ffffff', '#ffd700'],
          }));
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        createDots();
        updateSlideClasses();
        startSlideshow();

        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowLeft") changeSlide(-1);
          if (e.key === "ArrowRight") changeSlide(1);
          if (e.key === " ") {
            if (slideInterval) stopSlideshow();
            else startSlideshow();
          }
        });
      });

      // Shoutout Name Rotation
      const shoutoutNames = [
        "Alice Johnson",
        "Benjamin Lee",
        "Clara Martinez",
        "Daniel Kim",
        "Emily Smith",
        "Fiona Patel",
        "George Walker",
        "Hannah Davis"
      ];
      const nameShoutout = document.getElementById("name-shoutout");
      let currentNameIndex = 0;

      function updateShoutoutName() {
        nameShoutout.textContent = `🎉 Shoutout to ${shoutoutNames[currentNameIndex]}!`;
        currentNameIndex = (currentNameIndex + 1) % shoutoutNames.length;
      }

      updateShoutoutName();
      setInterval(updateShoutoutName, 5000);
    </script>
  </body>
</html>
